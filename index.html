                            "Mi creador es un apasionado de la automatización y la IA.",
                            "Mi creador es un experto en resolver problemas complejos con código.",
                            "Mi creador es un genio detrás de cada línea de mi código.",
                            "Mi creador es un visionario del software escalable y mantenible.",
                            "Mi creador es un experto en seguridad informática y buenas prácticas.",
                            "Mi creador es un mago del desarrollo móvil y web.",
                            "Mi creador es un experto en inteligencia artificial y machine learning.",
                            "Mi creador es un apasionado de la ética en la programación.",
                            "Mi creador es un experto en arquitectura de microservicios."
                        ];
                        return respuestasGenericas[Math.floor(Math.random() * respuestasGenericas.length)];
                    }
                    return respuesta;
                } else {
                    // Fallback si chat.js no se carga
                    const respuestas = [
                        "Interesante pregunta. ¿Podrías darme más contexto sobre qué lenguaje o framework estás usando?",
                        "Déjame analizar... ¿Esto es para web, móvil, backend?",
                        "Para ayudarte mejor, ¿me compartes un ejemplo de código o el error específico?",
                        "Esa es una gran pregunta de programación. ¿Qué estás intentando construir?",
                        "Mi creador es soyadrianyt001, un dios de la programación. 😮‍💨🔥"
                    ];
                    return respuestas[Math.floor(Math.random() * respuestas.length)];
                }
            }
        }

        const brain = new OcladeBrain();
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.querySelector('.send-btn');

        // 🧊 ANIMACIÓN 3D AL ENVIAR MENSAJE
        const canvasInline = document.getElementById('model3d-inline');
        const ctxInline = canvasInline.getContext('2d');
        let rotation = 0;
        let animationFrameId = null;
        let textIndex = 0;
        const texts = ["Pensando...", "Analizando...", "Optimizando...", "Corrigiendo...", "Generando respuesta..."];

        function iniciarAnimacion3D() {
            document.getElementById('loader-container').style.display = 'flex';

            function dibujarCubo() {
                ctxInline.clearRect(0, 0, canvasInline.width, canvasInline.height);
                ctxInline.save();
                ctxInline.translate(canvasInline.width / 2, canvasInline.height / 2);
                ctxInline.rotate(rotation);
                
                // Dibujar cara frontal (azul)
                ctxInline.fillStyle = '#00d9ff';
                ctxInline.fillRect(-8, -8, 16, 16);
                
                // Dibujar cara lateral (morada)
                ctxInline.fillStyle = '#7b2ff7';
                ctxInline.beginPath();
                ctxInline.moveTo(0, -8);
                ctxInline.lineTo(8, 0);
                ctxInline.lineTo(8, 16);
                ctxInline.lineTo(0, 16);
                ctxInline.fill();
                
                // Dibujar cara superior (transparente)
                ctxInline.fillStyle = 'rgba(255,255,255,0.1)';
                ctxInline.beginPath();
                ctxInline.moveTo(-8, -8);
                ctxInline.lineTo(0, -8);
                ctxInline.lineTo(8, 0);
                ctxInline.lineTo(0, 0);
                ctxInline.fill();

                ctxInline.restore();
                rotation += 0.05;
            }

            function actualizarTexto() {
                document.getElementById('loader-text').textContent = texts[textIndex];
                textIndex = (textIndex + 1) % texts.length;
            }

            function animate() {
                dibujarCubo();
                actualizarTexto();
                animationFrameId = requestAnimationFrame(animate);
            }

            animate();
        }

        function detenerAnimacion3D() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            document.getElementById('loader-container').style.display = 'none';
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            eliminarSaludo();

            const userMsg = document.createElement('div');
            userMsg.className = 'message user-msg';
            userMsg.innerHTML = formatResponse(message);
            chatArea.appendChild(userMsg);
            chatArea.scrollTop = chatArea.scrollHeight;

            userInput.value = '';

            // 🧊 Mostrar animación 3D
            iniciarAnimacion3D();

            showThinking();

            setTimeout(() => {
                hideThinking();
                // 🧊 Ocultar animación 3D
                detenerAnimacion3D();
                const respuesta = brain.analizar(message);
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai-msg';
                aiMsg.innerHTML = formatResponse(respuesta);
                chatArea.appendChild(aiMsg);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 1500 + Math.random() * 1000);
        }

        function showThinking() {
            const div = document.createElement('div');
            div.className = 'message ai-msg thinking';
            div.id = 'thinking';
            div.innerHTML = '<span></span><span></span>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideThinking() {
            const thinking = document.getElementById('thinking');
            if (thinking) thinking.remove();
        }

        function formatResponse(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\n/g, '<br>')
                .replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>');
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 🎨 FONDO DE PARTÍCULAS
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = Math.random() > 0.5 ? '#00d9ff' : '#7b2ff7';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0;
                if(this.x < 0) this.x = canvas.width;
                if(this.y > canvas.height) this.y = 0;
                if(this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 🎯 FUNCIONES DEL MENÚ LATERAL
        function limpiarChat() {
            chatArea.innerHTML = `
                <div class="welcome-center" id="welcomeCenter">
                    <div class="welcome-title" id="saludoTitle">${generarSaludo()}</div>
                    <div class="welcome-subtitle">¿En qué te puedo ayudar hoy?</div>
                </div>
            `;
            actualizarSaludo();
        }

        function generarSaludo() {
            const ahora = new Date();
            const hora = ahora.getHours();
            if (hora >= 6 && hora < 12) return "Buenos días";
            if (hora >= 12 && hora < 18) return "Buenas tardes";
            return "Buenas noches";
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

    <!-- 📦 INTEGRACIÓN CON CHAT.JS -->
    <script src="chat.js"></script>
</body>
</html>
